<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca API</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Biblioteca Digital</h1>

        <!-- Paso 1: Login con email y password -->
        <div id="login-step1" class="form-container">
            <h2>Iniciar Sesión - Paso 1</h2>
            <form id="form-step1">
                <label for="email">Email:</label>
                <input type="email" id="email" required>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" required>

                <button type="submit">Enviar Código</button>
            </form>
            <p id="message-step1"></p>
        </div>

        <!-- Paso 2: Verificación del código -->
        <div id="login-step2" class="form-container hidden">
            <h2>Iniciar Sesión - Paso 2</h2>
            <form id="form-step2">
                <label for="codigo">Código de Verificación:</label>
                <input type="text" id="codigo" required>

                <button type="submit">Verificar</button>
            </form>
            <p id="message-step2"></p>
        </div>

        <!-- Dashboard Estudiante -->
        <div id="dashboard-estudiante" class="dashboard hidden">
            <h2>Mi Espacio - Estudiante</h2>
            <h3>Libros Prestados:</h3>
            <ul id="libros-prestados"></ul>
            <button id="logout">Cerrar Sesión</button>
        </div>

        <!-- Dashboard Admin -->
        <div id="dashboard-admin" class="dashboard hidden">
            <h2>Dashboard - Administrador</h2>
            <h3>Inventario de Libros:</h3>
            <ul id="inventario"></ul>
            <button id="logout">Cerrar Sesión</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
